<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rae raytracer — WASM + WebGPU (W2)</title>
<style>
  body { margin: 0; background: #0a0a0e; color: #cfe3ff;
         font: 14px ui-monospace, Menlo, monospace; display: grid;
         place-items: center; min-height: 100vh; gap: 12px; }
  canvas { width: 960px; height: 540px; image-rendering: auto;
           border: 1px solid #223; background: #000; }
  #status { opacity: .85; }
</style>
</head>
<body>
  <canvas id="c" width="480" height="270"></canvas>
  <div id="status">loading…</div>
<script type="module">
// W1: a Rae compute core compiled to WASM writes its RGB framebuffer to stdout.
// W2: present that framebuffer through the browser's own WebGPU — upload it to a
// GPUTexture and blit it with a WGSL fullscreen shader (no Dawn/wgpu dependency;
// the browser provides WebGPU). Falls back to a 2D canvas where WebGPU is absent.
const WIDTH = 480, HEIGHT = 270;
const status = document.getElementById('status');
const canvas = document.getElementById('c');

// ---- WASI (preview1) shim: just enough to run a program that writes its RGB
// framebuffer to stdout (fd 1). No filesystem, no real args/env. -------------
const stdout = [];
let mem;
const u8  = () => new Uint8Array(mem.buffer);
const dv  = () => new DataView(mem.buffer);
class Exit { constructor(code){ this.code = code; } }

const wasi = {
  proc_exit(code){ throw new Exit(code); },
  fd_write(fd, iovsPtr, iovsLen, nwrittenPtr){
    const view = dv(); const bytes = u8(); let written = 0;
    for (let i = 0; i < iovsLen; i++){
      const p   = iovsPtr + i * 8;
      const buf = view.getUint32(p, true);
      const len = view.getUint32(p + 4, true);
      if (fd === 1) for (let j = 0; j < len; j++) stdout.push(bytes[buf + j]);
      written += len;
    }
    view.setUint32(nwrittenPtr, written, true);
    return 0;
  },
  args_sizes_get(c, b){ dv().setUint32(c,0,true); dv().setUint32(b,0,true); return 0; },
  args_get(){ return 0; },
  environ_sizes_get(c, b){ dv().setUint32(c,0,true); dv().setUint32(b,0,true); return 0; },
  environ_get(){ return 0; },
  fd_prestat_get(){ return 8; },
  fd_prestat_dir_name(){ return 8; },
  fd_fdstat_get(){ return 0; },
  fd_close(){ return 0; },
  fd_seek(){ return 0; },
  fd_read(){ return 0; },
  clock_time_get(){ return 0; },
  random_get(ptr, len){ const b = u8(); for (let i=0;i<len;i++) b[ptr+i] = (Math.random()*256)|0; return 0; },
};

// RGB (3 bytes/px) -> RGBA (texture upload format).
function toRGBA(rgb){
  const rgba = new Uint8Array(WIDTH * HEIGHT * 4);
  for (let i = 0, p = 0; i < WIDTH*HEIGHT; i++){
    rgba[i*4+0]=rgb[p++]; rgba[i*4+1]=rgb[p++]; rgba[i*4+2]=rgb[p++]; rgba[i*4+3]=255;
  }
  return rgba;
}

// ---- W2: present via browser WebGPU (texture + WGSL fullscreen blit) --------
async function presentWebGPU(rgb){
  if (!navigator.gpu) return false;
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) return false;
  const device  = await adapter.requestDevice();
  const ctx     = canvas.getContext('webgpu');
  const format  = navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({ device, format, alphaMode: 'opaque' });

  const tex = device.createTexture({
    size: [WIDTH, HEIGHT], format: 'rgba8unorm',
    usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST,
  });
  device.queue.writeTexture({ texture: tex }, toRGBA(rgb),
    { bytesPerRow: WIDTH*4, rowsPerImage: HEIGHT }, [WIDTH, HEIGHT]);
  const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

  // Fullscreen triangle + sample the framebuffer texture by normalised coords.
  const mod = device.createShaderModule({ code: `
    @vertex fn vs(@builtin(vertex_index) i: u32) -> @builtin(position) vec4f {
      var p = array<vec2f, 3>(vec2f(-1.0, -1.0), vec2f(3.0, -1.0), vec2f(-1.0, 3.0));
      return vec4f(p[i], 0.0, 1.0);
    }
    @group(0) @binding(0) var tex: texture_2d<f32>;
    @group(0) @binding(1) var smp: sampler;
    @fragment fn fs(@builtin(position) c: vec4f) -> @location(0) vec4f {
      let uv = c.xy / vec2f(${WIDTH}.0, ${HEIGHT}.0);
      return textureSample(tex, smp, uv);
    }` });
  const pipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex:   { module: mod, entryPoint: 'vs' },
    fragment: { module: mod, entryPoint: 'fs', targets: [{ format }] },
    primitive:{ topology: 'triangle-list' },
  });
  const bind = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [{ binding: 0, resource: tex.createView() },
              { binding: 1, resource: sampler }],
  });
  const enc  = device.createCommandEncoder();
  const pass = enc.beginRenderPass({
    colorAttachments: [{ view: ctx.getCurrentTexture().createView(),
                         clearValue: {r:0,g:0,b:0,a:1}, loadOp: 'clear', storeOp: 'store' }],
  });
  pass.setPipeline(pipeline); pass.setBindGroup(0, bind); pass.draw(3); pass.end();
  device.queue.submit([enc.finish()]);
  return true;
}

function presentCanvas2D(rgb){
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(WIDTH, HEIGHT);
  img.data.set(toRGBA(rgb));
  ctx.putImageData(img, 0, 0);
}

(async () => {
  try {
    status.textContent = 'fetching app.wasm…';
    const bytes = await (await fetch('../build/app.wasm')).arrayBuffer();
    const { instance } = await WebAssembly.instantiate(bytes, { wasi_snapshot_preview1: wasi });
    mem = instance.exports.memory;
    status.textContent = 'rendering (CPU path tracer in WASM)…';
    const t0 = performance.now();
    try { instance.exports._start(); } catch (e) { if (!(e instanceof Exit)) throw e; }
    const ms = (performance.now() - t0).toFixed(0);
    if (stdout.length !== WIDTH*HEIGHT*3){
      status.textContent = `unexpected output: ${stdout.length} bytes (want ${WIDTH*HEIGHT*3})`;
      return;
    }
    let how = 'WebGPU blit';
    if (!(await presentWebGPU(stdout))) { presentCanvas2D(stdout); how = 'canvas2d (no WebGPU)'; }
    status.textContent = `done — ${WIDTH}×${HEIGHT}, WASM render ${ms} ms, presented via ${how}`;
    document.title = `rae-w2: ${how}`;
  } catch (e){
    status.textContent = 'error: ' + e.message;
    console.error(e);
  }
})();
</script>
</body>
</html>
