<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rae raytracer — WebGPU compute (W3)</title>
<style>
  body { margin: 0; background: #0a0a0e; color: #cfe3ff;
         font: 14px ui-monospace, Menlo, monospace; display: grid;
         place-items: center; min-height: 100vh; gap: 12px; }
  canvas { width: 768px; height: 432px; image-rendering: auto;
           border: 1px solid #223; background: #000; }
  #status { opacity: .85; max-width: 768px; text-align: center; }
</style>
</head>
<body>
  <canvas id="c" width="768" height="432"></canvas>
  <div id="status">loading…</div>
<script type="module">
// W3: the GPU path tracer. The per-pixel path tracing runs as a WGSL *compute*
// shader (raytrace.wgsl — the SAME shader the native build runs, examples 50/53)
// through the browser's own WebGPU. The scene is authored in Rae: example 49's
// main.rae compiles to WASM and emits the camera + spheres as a flat f32 buffer
// to stdout; this harness captures it, uploads it to a storage buffer, and the
// compute shader renders a Rae-defined scene on the GPU. WebGPU-everywhere: one
// WGSL, browser + native.
const WIDTH = 768, HEIGHT = 432;
const SAMPLES = 24, MAX_DEPTH = 12;     // host-set render quality (Params uniform)
const status = document.getElementById('status');
const canvas = document.getElementById('c');
const fail = (msg) => { status.textContent = msg; document.title = 'rae-w3: ' + msg; };

// ---- WASI (preview1) shim: just enough to run a program that writes its scene
// float buffer to stdout (fd 1). No filesystem, no real args/env. -------------
const stdout = [];
let mem;
const u8  = () => new Uint8Array(mem.buffer);
const dv  = () => new DataView(mem.buffer);
class Exit { constructor(code){ this.code = code; } }

const wasi = {
  proc_exit(code){ throw new Exit(code); },
  fd_write(fd, iovsPtr, iovsLen, nwrittenPtr){
    const view = dv(); const bytes = u8(); let written = 0;
    for (let i = 0; i < iovsLen; i++){
      const p   = iovsPtr + i * 8;
      const buf = view.getUint32(p, true);
      const len = view.getUint32(p + 4, true);
      if (fd === 1) for (let j = 0; j < len; j++) stdout.push(bytes[buf + j]);
      written += len;
    }
    view.setUint32(nwrittenPtr, written, true);
    return 0;
  },
  args_sizes_get(c, b){ dv().setUint32(c,0,true); dv().setUint32(b,0,true); return 0; },
  args_get(){ return 0; },
  environ_sizes_get(c, b){ dv().setUint32(c,0,true); dv().setUint32(b,0,true); return 0; },
  environ_get(){ return 0; },
  fd_prestat_get(){ return 8; },
  fd_prestat_dir_name(){ return 8; },
  fd_fdstat_get(){ return 0; },
  fd_close(){ return 0; },
  fd_seek(){ return 0; },
  fd_read(){ return 0; },
  clock_time_get(){ return 0; },
  random_get(ptr, len){ const b = u8(); for (let i=0;i<len;i++) b[ptr+i] = (Math.random()*256)|0; return 0; },
};

// Run the WASM scene-emitter and return the camera+spheres as a Float32Array.
async function emitScene(){
  const bytes = await (await fetch('../build/app.wasm')).arrayBuffer();
  const { instance } = await WebAssembly.instantiate(bytes, { wasi_snapshot_preview1: wasi });
  mem = instance.exports.memory;
  try { instance.exports._start(); } catch (e) { if (!(e instanceof Exit)) throw e; }
  const buf = new Uint8Array(stdout);
  // Copy into an aligned ArrayBuffer before viewing as f32.
  const aligned = new Uint8Array(buf.length); aligned.set(buf);
  return new Float32Array(aligned.buffer);
}

// ---- W3: render the Rae scene with the WGSL compute shader, present via blit -
async function run(){
  if (!navigator.gpu) return fail('WebGPU not available in this browser');
  status.textContent = 'running WASM scene emitter…';
  const scene = await emitScene();
  const sphereCount = (scene.length - 19) / 10;
  if (sphereCount <= 0 || !Number.isInteger(sphereCount))
    return fail(`bad scene buffer: ${scene.length} floats`);

  status.textContent = `acquiring WebGPU adapter… (${sphereCount} spheres)`;
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) return fail('no WebGPU adapter');
  const device  = await adapter.requestDevice();

  // --- Buffers -------------------------------------------------------------
  // Params uniform: 8 x u32 (width, height, samples, maxDepth, sphereCount, frame, pad, pad).
  const params = new Uint32Array([WIDTH, HEIGHT, SAMPLES, MAX_DEPTH, sphereCount, 0, 0, 0]);
  const paramsBuf = device.createBuffer({ size: params.byteLength,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(paramsBuf, 0, params);

  const sceneBuf = device.createBuffer({ size: scene.byteLength,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(sceneBuf, 0, scene);

  const outBytes = WIDTH * HEIGHT * 4;          // packed RGBA8, one u32 per pixel
  const outBuf = device.createBuffer({ size: outBytes,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC });

  // --- Compute pipeline from the SAME raytrace.wgsl the native build uses ---
  status.textContent = 'compiling raytrace.wgsl (compute)…';
  const code = await (await fetch('../raytrace.wgsl')).text();
  const computeMod = device.createShaderModule({ code });
  const info = await computeMod.getCompilationInfo?.();
  if (info && info.messages.some(m => m.type === 'error')){
    console.error(info.messages);
    return fail('WGSL compile error: ' + info.messages.find(m => m.type === 'error').message);
  }
  const pipeline = device.createComputePipeline({
    layout: 'auto',
    compute: { module: computeMod, entryPoint: 'main' },
  });
  const bind = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: paramsBuf } },
      { binding: 1, resource: { buffer: sceneBuf } },
      { binding: 2, resource: { buffer: outBuf } },
    ],
  });

  // --- Dispatch (8x8 workgroups) -------------------------------------------
  status.textContent = `path tracing on GPU — ${WIDTH}×${HEIGHT}, ${SAMPLES} spp…`;
  const t0 = performance.now();
  const tex = device.createTexture({
    size: [WIDTH, HEIGHT], format: 'rgba8unorm',
    usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_DST,
  });
  const enc = device.createCommandEncoder();
  const pass = enc.beginComputePass();
  pass.setPipeline(pipeline); pass.setBindGroup(0, bind);
  pass.dispatchWorkgroups(Math.ceil(WIDTH / 8), Math.ceil(HEIGHT / 8), 1);
  pass.end();
  // outBuf packs bytes R,G,B,A little-endian per pixel == rgba8unorm texture data.
  // 768*4 = 3072 bytes/row is 256-aligned, so a direct buffer->texture copy works.
  enc.copyBufferToTexture(
    { buffer: outBuf, bytesPerRow: WIDTH * 4, rowsPerImage: HEIGHT },
    { texture: tex }, [WIDTH, HEIGHT]);
  device.queue.submit([enc.finish()]);

  // --- Present: blit the texture to the canvas (WGSL fullscreen triangle) ---
  const ctx    = canvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({ device, format, alphaMode: 'opaque' });
  const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
  const blitMod = device.createShaderModule({ code: `
    @vertex fn vs(@builtin(vertex_index) i: u32) -> @builtin(position) vec4f {
      var p = array<vec2f, 3>(vec2f(-1.0, -1.0), vec2f(3.0, -1.0), vec2f(-1.0, 3.0));
      return vec4f(p[i], 0.0, 1.0);
    }
    @group(0) @binding(0) var tex: texture_2d<f32>;
    @group(0) @binding(1) var smp: sampler;
    @fragment fn fs(@builtin(position) c: vec4f) -> @location(0) vec4f {
      let uv = c.xy / vec2f(${WIDTH}.0, ${HEIGHT}.0);
      return textureSample(tex, smp, uv);
    }` });
  const blit = device.createRenderPipeline({
    layout: 'auto',
    vertex:   { module: blitMod, entryPoint: 'vs' },
    fragment: { module: blitMod, entryPoint: 'fs', targets: [{ format }] },
    primitive:{ topology: 'triangle-list' },
  });
  const blitBind = device.createBindGroup({
    layout: blit.getBindGroupLayout(0),
    entries: [{ binding: 0, resource: tex.createView() },
              { binding: 1, resource: sampler }],
  });
  const enc2 = device.createCommandEncoder();
  const rp = enc2.beginRenderPass({
    colorAttachments: [{ view: ctx.getCurrentTexture().createView(),
                         clearValue: {r:0,g:0,b:0,a:1}, loadOp: 'clear', storeOp: 'store' }],
  });
  rp.setPipeline(blit); rp.setBindGroup(0, blitBind); rp.draw(3); rp.end();
  device.queue.submit([enc2.finish()]);
  await device.queue.onSubmittedWorkDone();
  const ms = (performance.now() - t0).toFixed(0);

  status.textContent = `done — ${WIDTH}×${HEIGHT}, ${SAMPLES} spp, GPU compute ${ms} ms (Rae scene, ${sphereCount} spheres)`;
  document.title = 'rae-w3: compute ok';
}

run().catch(e => { fail('error: ' + e.message); console.error(e); });
</script>
</body>
</html>
